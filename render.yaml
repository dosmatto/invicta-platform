# Render Blueprint — backend de interpolacao (fertilidade).
# No Render: New > Blueprint > conecte este repositorio (ele le este arquivo).
services:
  - type: web
    name: invicta-fertilidade-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # Starter = sempre ligado (sem hibernar/cold-start), p/ robustez ("parruda").
    # Se a krigagem estourar memória em talhões grandes, subir p/ standard (2 GB).
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
